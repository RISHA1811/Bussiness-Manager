<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KhataBook – Login</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <div class="logo">
      <h1>📒 KhataBook</h1>
      <p>Business Account Manager</p>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div id="loginAlert"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">🔐 Login</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
      <div id="regAlert"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Your business name"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Create password"/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="Repeat password"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">✅ Create Account</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.current()) window.location.href = 'dashboard.html';

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  }

  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    const alert = document.getElementById('loginAlert');
    if (!email || !pass) { alert.innerHTML = '<div class="alert alert-error">Fill all fields.</div>'; return; }
    if (Auth.login(email, pass)) {
      window.location.href = 'dashboard.html';
    } else {
      alert.innerHTML = '<div class="alert alert-error">Invalid email or password.</div>';
    }
  }

  function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const alert = document.getElementById('regAlert');
    if (!name || !email || !pass) { alert.innerHTML = '<div class="alert alert-error">Fill all fields.</div>'; return; }
    if (pass !== confirm) { alert.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>'; return; }
    if (Auth.register(name, email, pass)) {
      window.location.href = 'dashboard.html';
    } else {
      alert.innerHTML = '<div class="alert alert-error">Email already registered.</div>';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const isLogin = document.getElementById('loginForm').style.display !== 'none';
      isLogin ? doLogin() : doRegister();
    }
  });
</script>
</body>
</html>
