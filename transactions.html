<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transactions – KhataBook</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger" id="hamburger">☰</button>
        <h1>💰 Transactions</h1>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add</button>
    </div>
    <div class="page-content">

      <div class="stats-grid" id="txnStats"></div>

      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><h3>📅 Monthly Overview</h3></div>
        <div class="card-body"><canvas id="monthChart" style="max-height:200px"></canvas></div>
      </div>

      <div class="export-bar">
        <button class="btn btn-outline btn-sm" onclick="doExportCSV()">📥 Export CSV</button>
        <button class="btn btn-outline btn-sm" onclick="doExportPDF()">🖨️ Print / PDF</button>
      </div>

      <div class="filter-bar">
        <select id="dateRange" onchange="renderAll()">
          <option value="all">All Time</option>
          <option value="7d">Last 7 Days</option>
          <option value="30d">Last 30 Days</option>
          <option value="month">This Month</option>
          <option value="year">This Year</option>
        </select>
        <select id="monthFilter" onchange="renderAll()">
          <option value="">All Months</option>
        </select>
        <select id="typeFilter" onchange="renderTable()">
          <option value="">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <input type="text" id="searchFilter" oninput="renderTable()" placeholder="🔍 Search..."/>
      </div>

      <div class="card">
        <div class="card-header"><h3>📋 All Transactions</h3></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th>Action</th></tr></thead>
            <tbody id="txnTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<nav class="bottom-nav" id="bottomNav"></nav>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Transaction</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="fType">
        <option value="income">💚 Income</option>
        <option value="expense">❤️ Expense</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description *</label>
      <input type="text" id="fDesc" placeholder="e.g. Salary, Rent, Groceries"/>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="fCategory">
        <option>Salary</option><option>Business</option><option>Freelance</option>
        <option>Rent</option><option>Food</option><option>Transport</option>
        <option>Utilities</option><option>Medical</option><option>Shopping</option>
        <option>Entertainment</option><option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Amount (₹) *</label>
      <input type="number" id="fAmount" placeholder="0" min="0"/>
    </div>
    <div class="form-group">
      <label>Date *</label>
      <input type="date" id="fDate"/>
    </div>
    <div class="form-group">
      <label>Note</label>
      <textarea id="fNote" rows="2" placeholder="Optional notes..."></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
Auth.guard();
initDarkMode();
renderSidebar('transactions.html');

let editId = null;
let chartInstance = null;

function getTxns() { return DB.get('transactions') || []; }

function getFiltered() {
  const range = document.getElementById('dateRange').value;
  const monthF = document.getElementById('monthFilter').value;
  const typeF = document.getElementById('typeFilter').value;
  const search = document.getElementById('searchFilter').value.toLowerCase();
  return filterByDateRange(getTxns(), 'date', range).filter(t => {
    if (monthF && !t.date.startsWith(monthF)) return false;
    if (typeF && t.type !== typeF) return false;
    if (search && !t.description.toLowerCase().includes(search) && !t.category.toLowerCase().includes(search)) return false;
    return true;
  }).sort((a, b) => new Date(b.date) - new Date(a.date));
}

function openModal(id = null) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Transaction' : 'Add Transaction';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  if (id) {
    const t = getTxns().find(t => t.id === id);
    document.getElementById('fType').value = t.type;
    document.getElementById('fDesc').value = t.description;
    document.getElementById('fCategory').value = t.category;
    document.getElementById('fAmount').value = t.amount;
    document.getElementById('fDate').value = t.date;
    document.getElementById('fNote').value = t.note || '';
  } else {
    document.getElementById('fType').value = 'income';
    document.getElementById('fDesc').value = '';
    document.getElementById('fAmount').value = '';
    document.getElementById('fNote').value = '';
  }
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); editId = null; }

function saveTransaction() {
  const type = document.getElementById('fType').value;
  const description = document.getElementById('fDesc').value.trim();
  const category = document.getElementById('fCategory').value;
  const amount = parseFloat(document.getElementById('fAmount').value);
  const date = document.getElementById('fDate').value;
  const note = document.getElementById('fNote').value.trim();
  if (!description || !amount || !date) return alert('Fill required fields.');
  let txns = getTxns();
  if (editId) {
    txns = txns.map(t => t.id === editId ? { ...t, type, description, category, amount, date, note } : t);
  } else {
    txns.push({ id: uid(), type, description, category, amount, date, note });
  }
  DB.set('transactions', txns);
  closeModal();
  renderAll();
  showToast(type === 'income' ? 'Income added! 💰' : 'Expense added! 💸');
}

function deleteTransaction(id) {
  if (!confirm('Delete this transaction?')) return;
  DB.set('transactions', getTxns().filter(t => t.id !== id));
  renderAll();
  showToast('Transaction deleted.', 'info');
}

function doExportCSV() {
  exportCSV(
    ['Date','Description','Category','Type','Amount','Note'],
    getFiltered().map(t => [new Date(t.date).toLocaleDateString('en-IN'), t.description, t.category, t.type, t.amount, t.note||'']),
    'transactions.csv'
  );
}

function doExportPDF() {
  const rows = getFiltered().map(t =>
    '<tr><td>' + new Date(t.date).toLocaleDateString('en-IN') + '</td><td>' +
    t.description + '</td><td>' + t.category + '</td><td>' + t.type +
    '</td><td>₹' + Number(t.amount).toLocaleString('en-IN') + '</td></tr>'
  ).join('');
  exportPDF('Transactions Report', '<table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th></tr></thead><tbody>' + rows + '</tbody></table>');
}

function renderStats() {
  const txns = getTxns();
  const income = txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  document.getElementById('txnStats').innerHTML =
    '<div class="stat-card"><div class="stat-icon green">💰</div><div><div class="stat-label">Total Income</div><div class="stat-value green">' + fmt(income) + '</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon red">💸</div><div><div class="stat-label">Total Expenses</div><div class="stat-value red">' + fmt(expense) + '</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon ' + (income-expense>=0?'blue':'red') + '">📊</div><div><div class="stat-label">Net Balance</div><div class="stat-value ' + (income-expense>=0?'blue':'red') + '">' + fmt(income - expense) + '</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon orange">🔢</div><div><div class="stat-label">Transactions</div><div class="stat-value orange">' + txns.length + '</div></div></div>';
}

function renderMonthFilter() {
  const monthSet = new Set(getTxns().map(t => t.date.slice(0, 7)));
  const sel = document.getElementById('monthFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Months</option>' +
    [...monthSet].sort().reverse().map(m => '<option value="' + m + '"' + (m===cur?' selected':'') + '>' + m + '</option>').join('');
}

function renderChart() {
  const txns = getTxns();
  const now = new Date();
  const last6 = Array.from({length: 6}, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - 5 + i, 1);
    return { label: months[d.getMonth()], month: d.getMonth(), year: d.getFullYear() };
  });
  const iData = last6.map(m => txns.filter(t => t.type==='income' && new Date(t.date).getMonth()===m.month && new Date(t.date).getFullYear()===m.year).reduce((s,t)=>s+t.amount,0));
  const eData = last6.map(m => txns.filter(t => t.type==='expense' && new Date(t.date).getMonth()===m.month && new Date(t.date).getFullYear()===m.year).reduce((s,t)=>s+t.amount,0));
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('monthChart'), {
    type: 'line',
    data: { labels: last6.map(m=>m.label), datasets: [
      { label: 'Income', data: iData, borderColor: '#16a34a', backgroundColor: '#dcfce7', fill: true, tension: 0.4 },
      { label: 'Expenses', data: eData, borderColor: '#dc2626', backgroundColor: '#fee2e2', fill: true, tension: 0.4 }
    ]},
    options: { responsive: true, plugins: { legend: { position: 'top' } } }
  });
}

function renderTable() {
  const txns = getFiltered();
  if (!txns.length) {
    document.getElementById('txnTable').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:28px">No transactions found.</td></tr>';
    return;
  }
  document.getElementById('txnTable').innerHTML = txns.map(t => {
    const noteHtml = t.note ? '<div style="font-size:11px;color:var(--muted)">' + t.note + '</div>' : '';
    return '<tr>' +
      '<td>' + new Date(t.date).toLocaleDateString('en-IN') + '</td>' +
      '<td><div style="font-weight:500">' + t.description + '</div>' + noteHtml + '</td>' +
      '<td><span class="badge badge-blue">' + t.category + '</span></td>' +
      '<td><span class="badge ' + (t.type==='income'?'badge-green':'badge-red') + '">' + t.type + '</span></td>' +
      '<td style="font-weight:700;color:' + (t.type==='income'?'var(--success)':'var(--danger)') + '">' + fmt(t.amount) + '</td>' +
      '<td><button class="btn btn-outline btn-sm" onclick="openModal(\'' + t.id + '\')">✏️</button> ' +
      '<button class="btn btn-danger btn-sm" onclick="deleteTransaction(\'' + t.id + '\')">🗑️</button></td>' +
      '</tr>';
  }).join('');
}

function renderAll() { renderStats(); renderMonthFilter(); renderChart(); renderTable(); }
renderAll();
</script>
</body>
</html>
