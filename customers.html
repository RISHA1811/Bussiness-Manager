<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customers – KhataBook</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger" id="hamburger">☰</button>
        <h1>👥 Customers</h1>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add</button>
    </div>
    <div class="page-content">

      <div class="stats-grid" id="custStats"></div>

      <!-- Export -->
      <div class="export-bar">
        <button class="btn btn-outline btn-sm" onclick="doExportCSV()">📥 Export CSV</button>
        <button class="btn btn-outline btn-sm" onclick="doExportPDF()">🖨️ Print / PDF</button>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <input type="text" id="searchFilter" oninput="renderCards()" placeholder="🔍 Search name / phone..." style="flex:1;min-width:160px"/>
        <select id="dateRange" onchange="renderCards()">
          <option value="all">All Time</option>
          <option value="7d">Last 7 Days</option>
          <option value="30d">Last 30 Days</option>
          <option value="month">This Month</option>
        </select>
        <select id="sortFilter" onchange="renderCards()">
          <option value="name">Sort: Name</option>
          <option value="date">Sort: Date</option>
          <option value="balance">Sort: Balance</option>
          <option value="score">Sort: Credit Score</option>
        </select>
      </div>

      <div id="custGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px"></div>
    </div>
  </div>
</div>
<nav class="bottom-nav" id="bottomNav"></nav>

<!-- Add/Edit Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Customer</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group"><label>Full Name *</label><input type="text" id="fName" placeholder="Customer name"/></div>
    <div class="form-group"><label>Phone *</label><input type="tel" id="fPhone" placeholder="Mobile number"/></div>
    <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="email@example.com"/></div>
    <div class="form-group"><label>Address</label><textarea id="fAddress" rows="2" placeholder="Full address..."></textarea></div>
    <div class="form-group"><label>Opening Balance (₹)</label><input type="number" id="fBalance" placeholder="0" value="0"/></div>
    <div class="form-group">
      <label>Balance Type</label>
      <select id="fBalType">
        <option value="credit">Credit (Customer owes you)</option>
        <option value="debit">Debit (You owe customer)</option>
      </select>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="fNote" rows="2" placeholder="Any remarks..."></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Save</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-overlay hidden" id="viewModalOverlay">
  <div class="modal" style="max-width:540px">
    <div class="modal-header">
      <h3>👤 Customer Details</h3>
      <button class="modal-close" onclick="closeViewModal()">×</button>
    </div>
    <div id="viewContent"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
Auth.guard();
initDarkMode();
renderSidebar('customers.html');

let editId = null;
function getCustomers() { return DB.get('customers') || []; }

function openModal(id = null) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Customer' : 'Add Customer';
  if (id) {
    const c = getCustomers().find(c => c.id === id);
    document.getElementById('fName').value = c.name;
    document.getElementById('fPhone').value = c.phone;
    document.getElementById('fEmail').value = c.email || '';
    document.getElementById('fAddress').value = c.address || '';
    document.getElementById('fBalance').value = c.balance;
    document.getElementById('fBalType').value = c.balType;
    document.getElementById('fNote').value = c.note || '';
  } else {
    ['fName','fPhone','fEmail','fAddress','fNote'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('fBalance').value = '0';
    document.getElementById('fBalType').value = 'credit';
  }
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); editId = null; }

function saveCustomer() {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const address = document.getElementById('fAddress').value.trim();
  const balance = parseFloat(document.getElementById('fBalance').value) || 0;
  const balType = document.getElementById('fBalType').value;
  const note = document.getElementById('fNote').value.trim();
  if (!name || !phone) return alert('Name and phone are required.');
  let customers = getCustomers();
  if (editId) {
    customers = customers.map(c => c.id === editId ? { ...c, name, phone, email, address, balance, balType, note } : c);
  } else {
    customers.push({ id: uid(), name, phone, email, address, balance, balType, note, createdAt: new Date().toISOString() });
  }
  DB.set('customers', customers);
  closeModal();
  renderAll();
}

function deleteCustomer(id) {
  if (!confirm('Delete this customer?')) return;
  DB.set('customers', getCustomers().filter(c => c.id !== id));
  renderAll();
}

function openViewModal(id) {
  const c = getCustomers().find(c => c.id === id);
  const loans = (DB.get('loans') || []).filter(l => l.name.toLowerCase() === c.name.toLowerCase());
  const cs = calcCreditScore(c.id, c.name);

  document.getElementById('viewContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;flex-shrink:0">${c.name[0].toUpperCase()}</div>
      <div>
        <div style="font-size:19px;font-weight:700">${c.name}</div>
        <div style="color:var(--muted);font-size:13px">📞 ${c.phone}</div>
        ${c.email?`<div style="color:var(--muted);font-size:12px">✉️ ${c.email}</div>`:''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="background:var(--bg);padding:12px;border-radius:8px;text-align:center">
        <div style="font-size:11px;color:var(--muted)">Balance</div>
        <div style="font-size:16px;font-weight:700;color:${c.balType==='credit'?'var(--success)':'var(--danger)'}">${fmt(c.balance)}</div>
        <div style="font-size:10px;color:var(--muted)">${c.balType==='credit'?'Owes you':'You owe'}</div>
      </div>
      <div style="background:var(--bg);padding:12px;border-radius:8px;text-align:center">
        <div style="font-size:11px;color:var(--muted)">Loans</div>
        <div style="font-size:16px;font-weight:700;color:var(--primary)">${loans.length}</div>
        <div style="font-size:10px;color:var(--muted)">Records</div>
      </div>
      <div style="background:var(--bg);padding:12px;border-radius:8px;text-align:center">
        <div style="font-size:11px;color:var(--muted)">Credit Score</div>
        <div style="font-size:16px;font-weight:700;color:${cs.color}">${cs.score}</div>
        <div style="font-size:10px;color:${cs.color}">${cs.label}</div>
      </div>
    </div>
    ${c.address?`<div style="margin-bottom:12px;font-size:13px">📍 ${c.address}</div>`:''}
    ${c.note?`<div style="margin-bottom:12px;background:var(--bg);padding:10px;border-radius:8px;font-size:13px">📝 ${c.note}</div>`:''}
    ${loans.length?`
      <div style="font-weight:600;margin-bottom:8px;font-size:13px">🏦 Loan History</div>
      ${loans.map(l=>`<div style="display:flex;justify-content:space-between;padding:8px;background:var(--bg);border-radius:6px;margin-bottom:6px;font-size:13px">
        <span>${l.direction==='given'?'📤':'📥'} ${new Date(l.date).toLocaleDateString('en-IN')}</span>
        <span style="font-weight:600">${fmt(l.amount)}</span>
      </div>`).join('')}`:''}
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="closeViewModal();openModal('${c.id}')">✏️ Edit</button>
      ${c.phone?`<button class="btn btn-sm" style="background:#25d366;color:#fff" onclick="sendWhatsApp('${c.phone}','${c.name}',${c.balance})">💬 WhatsApp</button>`:''}
      <button class="btn btn-danger btn-sm" onclick="closeViewModal();deleteCustomer('${c.id}')">🗑️ Delete</button>
    </div>`;
  document.getElementById('viewModalOverlay').classList.remove('hidden');
}
function closeViewModal() { document.getElementById('viewModalOverlay').classList.add('hidden'); }

function doExportCSV() {
  const customers = getCustomers();
  exportCSV(
    ['Name','Phone','Email','Balance','Balance Type','Address','Note'],
    customers.map(c => [c.name, c.phone, c.email||'', c.balance, c.balType, c.address||'', c.note||'']),
    'customers.csv'
  );
}

function doExportPDF() {
  const customers = getCustomers();
  const rows = customers.map(c => `<tr>
    <td>${c.name}</td><td>${c.phone}</td>
    <td>₹${Number(c.balance).toLocaleString('en-IN')}</td>
    <td>${c.balType}</td>
    <td>${calcCreditScore(c.id,c.name).label}</td>
  </tr>`).join('');
  exportPDF('Customers Report', `<table><thead><tr><th>Name</th><th>Phone</th><th>Balance</th><th>Type</th><th>Credit</th></tr></thead><tbody>${rows}</tbody></table>`);
}

function renderStats() {
  const customers = getCustomers();
  const totalCredit = customers.filter(c=>c.balType==='credit').reduce((s,c)=>s+c.balance,0);
  const totalDebit = customers.filter(c=>c.balType==='debit').reduce((s,c)=>s+c.balance,0);
  document.getElementById('custStats').innerHTML = `
    <div class="stat-card"><div class="stat-icon blue">👥</div><div><div class="stat-label">Total Customers</div><div class="stat-value blue">${customers.length}</div></div></div>
    <div class="stat-card"><div class="stat-icon green">💰</div><div><div class="stat-label">Total Receivable</div><div class="stat-value green">${fmt(totalCredit)}</div></div></div>
    <div class="stat-card"><div class="stat-icon red">💸</div><div><div class="stat-label">Total Payable</div><div class="stat-value red">${fmt(totalDebit)}</div></div></div>`;
}

function renderCards() {
  const search = document.getElementById('searchFilter').value.toLowerCase();
  const sort = document.getElementById('sortFilter').value;
  const range = document.getElementById('dateRange').value;
  let customers = filterByDateRange(getCustomers(), 'createdAt', range)
    .filter(c => c.name.toLowerCase().includes(search) || c.phone.includes(search));

  if (sort === 'name') customers.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'date') customers.sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
  else if (sort === 'balance') customers.sort((a,b) => b.balance-a.balance);
  else if (sort === 'score') customers.sort((a,b) => calcCreditScore(b.id,b.name).score - calcCreditScore(a.id,a.name).score);

  document.getElementById('custGrid').innerHTML = customers.length
    ? customers.map(c => {
        const cs = calcCreditScore(c.id, c.name);
        return `<div class="card" style="cursor:pointer" onclick="openViewModal('${c.id}')">
          <div class="card-body">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              <div style="width:42px;height:42px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;font-weight:700;flex-shrink:0">${c.name[0].toUpperCase()}</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
                <div style="color:var(--muted);font-size:12px">📞 ${c.phone}</div>
              </div>
              <span class="badge ${c.balType==='credit'?'badge-green':'badge-red'}">${c.balType==='credit'?'Credit':'Debit'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:flex-end">
              <div>
                <div style="font-size:11px;color:var(--muted)">${c.balType==='credit'?'Owes You':'You Owe'}</div>
                <div style="font-size:17px;font-weight:700;color:${c.balType==='credit'?'var(--success)':'var(--danger)'}">${fmt(c.balance)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:10px;color:var(--muted)">Credit Score</div>
                <div style="font-size:13px;font-weight:700;color:${cs.color}">${cs.score} · ${cs.label}</div>
                <div class="score-bar" style="width:80px"><div class="score-fill" style="width:${cs.score}%;background:${cs.color}"></div></div>
              </div>
            </div>
            <div style="display:flex;gap:6px;margin-top:10px" onclick="event.stopPropagation()">
              ${c.phone?`<button class="btn btn-sm" style="background:#25d366;color:#fff;flex:1" onclick="sendWhatsApp('${c.phone}','${c.name}',${c.balance})">💬</button>`:''}
              <button class="btn btn-outline btn-sm" style="flex:1" onclick="openModal('${c.id}')">✏️ Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteCustomer('${c.id}')">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join('')
    : '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">No customers found.</div>';
}

function renderAll() { renderStats(); renderCards(); }
renderAll();
</script>
</body>
</html>
